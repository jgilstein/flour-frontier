  const icon=L.divIcon({
    className:'wh-icon',
    html:`<div style="width:11px;height:11px;background:#1a2332;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.6);"></div>`,
    iconSize:[16,16],iconAnchor:[8,8]
  });
  L.marker([wh.lat,wh.lng],{icon,zIndexOffset:400}).addTo(map)
    .bindTooltip(`■ ${wh.name}`,{direction:'top'})
    .bindPopup(`<div class="popup-title">${wh.name}</div><div class="popup-row"><span class="popup-label">Type</span><span class="popup-value">GM Warehouse</span></div><div class="popup-row"><span class="popup-label">Code</span><span class="popup-value">${wh.code}</span></div>`, popupOptions);
});
const legend=L.control({position:'bottomright'});
legend.onAdd=function(){
  const div=L.DomUtil.create('div','legend');
  div.innerHTML=`
    <strong>The True 5</strong>
    <div><span class="rank-badge" style="background:${rankColors[1]};">#1</span> Houston</div>
    <div><span class="rank-badge" style="background:${rankColors[2]};">#2</span> DFW</div>
    <div><span class="rank-badge" style="background:${rankColors[3]};">#3</span> Atlanta</div>
    <div><span class="rank-badge" style="background:${rankColors[4]};">#4</span> Tampa</div>
    <div><span class="rank-badge" style="background:${rankColors[5]};">#5</span> Phoenix</div>
    <strong>Metro Score</strong>
    <div><span class="dot" style="background:${scoreColors[5]}"></span> 5 — Hot</div>
    <div><span class="dot" style="background:${scoreColors[4]}"></span> 4 — Watch list</div>
    <div><span class="dot" style="background:${scoreColors[3]}"></span> 3 — Steady</div>
    <div><span class="dot" style="background:${scoreColors[2]}"></span> 2 — Underperforming</div>
    <div><span class="dot" style="background:${scoreColors[1]}"></span> 1 — Cold</div>
    <strong>GM Footprint</strong>
    <div><span class="diamond"></span> Mill</div>
    <div><span class="square"></span> Warehouse</div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
